<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Layout</title>
</head>
<style>
    body{
           width: 1200px;
            margin: 0 auto;
            display: flex;
    }
    .left-box{
        background-color: blue;
       flex-grow: 1;
    }
    .right-box{
        background-color: red;
                flex-grow: 2;
    }
</style>
<body>
    <div class="left-box">
        <p class="text">Left</p>
    </div>
    <div class="right-box">
        <p class="text">Right</p>
    </div>
</body>
</html>
